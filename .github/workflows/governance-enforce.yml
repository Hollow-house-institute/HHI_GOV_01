name: governance-enforce
on: [push]
jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify telemetry exists
        run: test -f telemetry/GOVERNANCE_LOG.jsonl
      - name: verify checksum exists
        run: test -f telemetry/GOVERNANCE_LOG.sha256
      - name: verify checksum integrity
        run: sha256sum -c telemetry/GOVERNANCE_LOG.sha256
